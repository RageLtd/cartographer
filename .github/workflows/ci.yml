name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check

      - name: Run tests
        run: cargo test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          cargo build --release
          ls -lh target/release/cartographer

  version-preview:
    name: Version Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preview Version Bump
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get commits in this PR (not in base branch)
          echo "Version Bump Preview"
          echo "========================"
          echo ""
          echo "Commits in this PR:"
          git log "origin/$BASE_REF..HEAD" --oneline
          echo ""

          # Analyze PR commits for version bump
          COMMITS=$(git log "origin/$BASE_REF..HEAD" --format="%s")

          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+!:' || echo "$msg" | grep -q "BREAKING CHANGE"; then
              HAS_BREAKING=true
            fi
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              HAS_FEAT=true
            fi
            if echo "$msg" | grep -qE '^(fix|refactor|test|style|perf|ci|build|revert)(\(.+\))?:'; then
              HAS_FIX=true
            fi
          done <<EOF
          $COMMITS
          EOF

          # Determine bump type
          if $HAS_BREAKING; then
            BUMP="major"
          elif $HAS_FEAT; then
            BUMP="minor"
          elif $HAS_FIX; then
            BUMP="patch"
          else
            BUMP="none"
          fi

          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          $CURRENT_VERSION
          EOF

          case $BUMP in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            *) NEW_VERSION="$CURRENT_VERSION" ;;
          esac

          echo "Bump type: $BUMP"
          echo "Version: $CURRENT_VERSION -> $NEW_VERSION"

          # Add to summary
          {
            echo "## Version Bump Preview"
            echo ""
            echo "**Commits in this PR:**"
            echo '```'
            git log "origin/$BASE_REF..HEAD" --oneline
            echo '```'
            echo ""
            echo "| Current | Bump | New |"
            echo "|---------|------|-----|"
            echo "| $CURRENT_VERSION | $BUMP | $NEW_VERSION |"
          } >> $GITHUB_STEP_SUMMARY
