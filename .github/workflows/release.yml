name: Version Bump & Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  version-bump:
    name: Analyze & Bump Version
    runs-on: ubuntu-latest
    # Don't run on release commits to avoid infinite loops
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      should_release: ${{ steps.dry-run.outputs.should_release }}
      new_version: ${{ steps.dry-run.outputs.new_version }}
      bump_type: ${{ steps.dry-run.outputs.bump_type }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for tag detection
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Version Bump (Dry Run)
        id: dry-run
        run: |
          OUTPUT=$(sh scripts/release.sh --dry-run 2>&1)
          echo "$OUTPUT"

          # Extract version info
          if echo "$OUTPUT" | grep -q "Nothing to do"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(echo "$OUTPUT" | grep "Version:" | sed 's/.*→ //')
            BUMP_TYPE=$(echo "$OUTPUT" | grep "Bump type:" | sed 's/.*: //')
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          fi

      - name: Run Version Bump
        if: steps.dry-run.outputs.should_release == 'true'
        run: sh scripts/release.sh

      - name: Push Changes and Tags
        if: steps.dry-run.outputs.should_release == 'true'
        run: git push --follow-tags

      - name: Summary
        if: steps.dry-run.outputs.should_release == 'true'
        run: |
          echo "## Release v${{ steps.dry-run.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **New Version:** v${{ steps.dry-run.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type:** ${{ steps.dry-run.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY

      - name: No Release Needed
        if: steps.dry-run.outputs.should_release != 'true'
        run: |
          echo "## No Version Bump Needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No conventional commits found that require a version bump." >> $GITHUB_STEP_SUMMARY

  build-binaries:
    name: Build (${{ matrix.platform }})
    needs: [version-bump]
    if: needs.version-bump.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest (including version bump)
        run: git pull origin main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign binary (macOS)
        if: startsWith(matrix.platform, 'darwin')
        run: codesign --force --sign - target/${{ matrix.target }}/release/cartographer

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/cartographer cartographer-${{ matrix.platform }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\cartographer.exe cartographer-${{ matrix.platform }}.exe

      - name: Upload binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cartographer-${{ matrix.platform }}
          path: cartographer-${{ matrix.platform }}

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: cartographer-${{ matrix.platform }}
          path: cartographer-${{ matrix.platform }}.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version-bump, build-binaries]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.version-bump.outputs.new_version }}" \
            --title "v${{ needs.version-bump.outputs.new_version }}" \
            --generate-notes \
            dist/cartographer-darwin-arm64 \
            dist/cartographer-darwin-x64 \
            dist/cartographer-linux-x64 \
            dist/cartographer-windows-x64.exe

      - name: Notify marketplace
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_PAT }}
          VERSION: ${{ needs.version-bump.outputs.new_version }}
        run: |
          gh api repos/RageLtd/claude-plugins/dispatches \
            -f event_type=plugin-release \
            -f "client_payload[plugin_name]=cartographer" \
            -f "client_payload[version]=$VERSION"

      - name: Release Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.version-bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Assets:**" >> $GITHUB_STEP_SUMMARY
          echo "- cartographer-darwin-arm64 (macOS M1/M2/M3)" >> $GITHUB_STEP_SUMMARY
          echo "- cartographer-darwin-x64 (macOS Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- cartographer-linux-x64" >> $GITHUB_STEP_SUMMARY
          echo "- cartographer-windows-x64.exe" >> $GITHUB_STEP_SUMMARY
